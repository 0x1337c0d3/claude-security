name: Sentinel Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_call:
    inputs:
      fail_on_severity:
        description: "Minimum severity to fail the workflow (CRITICAL, HIGH, MEDIUM, LOW)"
        type: string
        default: "HIGH"
    secrets: {}

permissions:
  contents: read

jobs:
  sentinel-scan:
    name: Sentinel Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Install dependencies ─────────────────────────────────────────────
      - name: Install semgrep
        run: pip install semgrep --quiet

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      # jq is pre-installed on ubuntu runners; verify it
      - name: Verify jq
        run: jq --version

      # ── Detect stack ─────────────────────────────────────────────────────
      - name: Detect technology stack
        id: stack
        run: |
          SCRIPTS_DIR="$GITHUB_WORKSPACE/skills/sentinel/scripts"
          STACK="$("$SCRIPTS_DIR/detect-stack.sh" "$GITHUB_WORKSPACE")"
          echo "stack=$(echo "$STACK" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "languages=$(echo "$STACK" | jq -c '.languages')" >> "$GITHUB_OUTPUT"
          echo "Detected languages: $(echo "$STACK" | jq -r '.languages | join(", ")')"

      # ── SAST scan ────────────────────────────────────────────────────────
      - name: Run SAST (Semgrep)
        id: sast
        run: |
          SCRIPTS_DIR="$GITHUB_WORKSPACE/skills/sentinel/scripts"
          SCAN_TMP="$(mktemp -d)"
          echo "scan_tmp=$SCAN_TMP" >> "$GITHUB_OUTPUT"

          LANGUAGES="$(echo '${{ steps.stack.outputs.languages }}' | jq -r '.[]' 2>/dev/null || true)"

          if [[ -z "$LANGUAGES" ]]; then
            echo "No languages detected — skipping SAST"
            exit 0
          fi

          while IFS= read -r lang; do
            [[ -z "$lang" ]] && continue
            echo "Running SAST for: $lang"
            "$SCRIPTS_DIR/run-sast.sh" "$GITHUB_WORKSPACE" "$lang" \
              > "$SCAN_TMP/sast-${lang}.json" 2>&1 || true
          done <<< "$LANGUAGES"

          echo "SAST files written to $SCAN_TMP"

      # ── Secrets scan ─────────────────────────────────────────────────────
      - name: Run secrets scan (gitleaks)
        id: secrets
        run: |
          SCRIPTS_DIR="$GITHUB_WORKSPACE/skills/sentinel/scripts"
          SCAN_TMP="${{ steps.sast.outputs.scan_tmp }}"

          "$SCRIPTS_DIR/run-secrets.sh" "$GITHUB_WORKSPACE" \
            > "$SCAN_TMP/secrets.json" 2>&1 || true

          echo "Secrets scan complete"

      # ── Consolidate ───────────────────────────────────────────────────────
      - name: Consolidate findings
        id: consolidate
        run: |
          SCRIPTS_DIR="$GITHUB_WORKSPACE/skills/sentinel/scripts"
          SCAN_TMP="${{ steps.sast.outputs.scan_tmp }}"
          CONSOLIDATED="$SCAN_TMP/consolidated.json"

          # Collect all output files
          INPUT_FILES=()
          for f in "$SCAN_TMP"/*.json; do
            [[ -f "$f" ]] && INPUT_FILES+=("$f")
          done

          if [[ ${#INPUT_FILES[@]} -eq 0 ]]; then
            echo "No scan output files found"
            echo '{"findings":[],"summary":{"total":0,"by_severity":{"critical":0,"high":0,"medium":0,"low":0}}}' > "$CONSOLIDATED"
          else
            "$SCRIPTS_DIR/consolidate.sh" "${INPUT_FILES[@]}" > "$CONSOLIDATED"
          fi

          echo "consolidated=$CONSOLIDATED" >> "$GITHUB_OUTPUT"
          echo "Consolidated findings written"

      # ── Score ─────────────────────────────────────────────────────────────
      - name: Calculate risk score
        id: score
        run: |
          SCRIPTS_DIR="$GITHUB_WORKSPACE/skills/sentinel/scripts"
          CONSOLIDATED="${{ steps.consolidate.outputs.consolidated }}"

          SCORE_JSON="$("$SCRIPTS_DIR/calculate-score.sh" "$CONSOLIDATED")"
          echo "score_json=$SCORE_JSON" >> "$GITHUB_OUTPUT"

          SCORE="$(echo "$SCORE_JSON" | jq '.score')"
          RISK="$(echo "$SCORE_JSON" | jq -r '.risk_level')"
          echo "Security score: $SCORE / 100  (risk level: $RISK)"

      # ── Summary table ─────────────────────────────────────────────────────
      - name: Print summary
        run: |
          CONSOLIDATED="${{ steps.consolidate.outputs.consolidated }}"
          SCORE_JSON='${{ steps.score.outputs.score_json }}'

          CRITICAL="$(jq '.summary.by_severity.critical // 0' "$CONSOLIDATED")"
          HIGH="$(jq '.summary.by_severity.high // 0' "$CONSOLIDATED")"
          MEDIUM="$(jq '.summary.by_severity.medium // 0' "$CONSOLIDATED")"
          LOW="$(jq '.summary.by_severity.low // 0' "$CONSOLIDATED")"
          TOTAL="$(jq '.summary.total // 0' "$CONSOLIDATED")"
          SCORE="$(echo "$SCORE_JSON" | jq '.score')"
          RISK="$(echo "$SCORE_JSON" | jq -r '.risk_level')"

          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║        SENTINEL SCAN SUMMARY         ║"
          echo "╠══════════════════════════════════════╣"
          printf "║  %-20s  %12s  ║\n" "Security Score" "$SCORE / 100"
          printf "║  %-20s  %12s  ║\n" "Risk Level" "$RISK"
          echo "╠══════════════════════════════════════╣"
          printf "║  %-20s  %12s  ║\n" "CRITICAL" "$CRITICAL"
          printf "║  %-20s  %12s  ║\n" "HIGH" "$HIGH"
          printf "║  %-20s  %12s  ║\n" "MEDIUM" "$MEDIUM"
          printf "║  %-20s  %12s  ║\n" "LOW" "$LOW"
          printf "║  %-20s  %12s  ║\n" "TOTAL" "$TOTAL"
          echo "╚══════════════════════════════════════╝"
          echo ""

          # Print individual findings if any exist
          if [[ "$TOTAL" -gt 0 ]]; then
            echo "Top findings:"
            jq -r '.findings[:10][] | "  [\(.severity)] \(.file // "?"):\(.line // "?")  \(.title // .description // "unknown")"' \
              "$CONSOLIDATED" || true
          fi

      # ── Annotate PR with findings ─────────────────────────────────────────
      - name: Annotate findings (PR)
        if: github.event_name == 'pull_request'
        run: |
          CONSOLIDATED="${{ steps.consolidate.outputs.consolidated }}"

          # Emit GitHub Actions workflow commands to annotate lines
          jq -r '.findings[] | select(.severity == "CRITICAL" or .severity == "HIGH") |
            "::error file=\(.file // "unknown"),line=\(.line // 1)::\(.severity) — \(.title // .description // "security finding")"
          ' "$CONSOLIDATED" || true

          jq -r '.findings[] | select(.severity == "MEDIUM") |
            "::warning file=\(.file // "unknown"),line=\(.line // 1)::\(.severity) — \(.title // .description // "security finding")"
          ' "$CONSOLIDATED" || true

      # ── Fail on blocking findings ─────────────────────────────────────────
      - name: Fail on CRITICAL/HIGH findings
        run: |
          CONSOLIDATED="${{ steps.consolidate.outputs.consolidated }}"
          FAIL_SEVERITY="${{ inputs.fail_on_severity || 'HIGH' }}"

          case "$FAIL_SEVERITY" in
            CRITICAL)
              COUNT="$(jq '.summary.by_severity.critical // 0' "$CONSOLIDATED")"
              LABEL="CRITICAL"
              ;;
            HIGH|*)
              CRITICAL="$(jq '.summary.by_severity.critical // 0' "$CONSOLIDATED")"
              HIGH="$(jq '.summary.by_severity.high // 0' "$CONSOLIDATED")"
              COUNT=$((CRITICAL + HIGH))
              LABEL="CRITICAL/HIGH"
              ;;
          esac

          if [[ "$COUNT" -gt 0 ]]; then
            echo "::error::Sentinel blocked: $COUNT $LABEL finding(s). Review findings above."
            exit 1
          else
            echo "Sentinel: no blocking findings. Scan passed."
          fi
